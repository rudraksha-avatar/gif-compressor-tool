    <style>
      :root {
        --color-bg: #f6f7f9;
        --color-surface: #ffffff;
        --color-surface-alt: #f0f2f5;
        --color-text: #111827;
        --color-text-muted: #5f6b7a;
        --color-border: #dfe3e8;
        --color-border-strong: #c1c9d2;
        --color-accent: #2563eb;
        --color-accent-dark: #1d4ed8;
        --radius-sm: 6px;
        --radius: 10px;
        --container: 1180px;
        --header-height: 64px;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-width: 320px;
        background: var(--color-bg);
        color: var(--color-text);
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 1rem;
        line-height: 1.6;
      }

      body { min-height: 100vh; display: flex; flex-direction: column; }

      a { color: var(--color-accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .site-shell { min-height: 100vh; display: flex; flex-direction: column; }

      .container {
        width: min(100%, var(--container));
        margin: 0 auto;
        padding-inline: 1.5rem;
      }

      /* Header */
      .site-header {
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        height: var(--header-height);
        display: flex;
        align-items: center;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--color-text);
        text-decoration: none;
        font-weight: 700;
        font-size: 1rem;
      }

      .brand:hover { text-decoration: none; color: var(--color-text); }

      .brand-mark {
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--color-border);
        background: var(--color-surface-alt);
        border-radius: 6px;
        font-size: 1.125rem;
      }

      .topnav {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .topnav a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 8px 12px;
        color: var(--color-text-muted);
        text-decoration: none;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
      }

      .topnav a:hover {
        color: var(--color-text);
        background: var(--color-surface-alt);
        text-decoration: none;
      }

      /* Main */
      .main-content { flex: 1; }

      .not-found-section {
        padding: 80px 0;
        text-align: center;
      }

      .not-found-icon {
        font-size: 4rem;
        color: var(--color-text-muted);
        margin-bottom: 24px;
      }

      .not-found-title {
        font-size: 1.875rem;
        font-weight: 700;
        margin: 0 0 12px;
        color: var(--color-text);
      }

      .not-found-description {
        font-size: 1.125rem;
        color: var(--color-text-muted);
        max-width: 480px;
        margin: 0 auto 32px;
      }

      .not-found-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        height: 44px;
        padding: 0 20px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        text-decoration: none;
        white-space: nowrap;
      }

      button.btn { appearance: none; }

      .btn-primary {
        background: var(--color-accent);
        color: #ffffff;
        border-color: var(--color-accent);
      }

      .btn-primary:hover {
        background: var(--color-accent-dark);
        border-color: var(--color-accent-dark);
        color: #ffffff;
        text-decoration: none;
      }

      .btn-secondary {
        background: var(--color-surface);
        color: var(--color-text);
        border-color: var(--color-border-strong);
      }

      .btn-secondary:hover {
        background: var(--color-surface-alt);
        text-decoration: none;
      }

      /* Footer */
      .site-footer {
        background: var(--color-surface);
        border-top: 1px solid var(--color-border);
        margin-top: auto;
      }

      .footer-inner { padding: 32px 0; }

      .footer-credit {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        margin: 0;
        text-align: center;
      }

      .footer-credit a {
        color: var(--color-text-muted);
        text-decoration: underline;
      }

      @media (max-width: 640px) {
        .topnav { display: none; }
        .not-found-actions { flex-direction: column; align-items: center; }
        .btn { width: 100%; max-width: 280px; }
